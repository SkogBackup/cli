[project]
name = "skogcli"
version = "0.1.0"
description = "CLI tool for the SkogAI-project"
readme = "README.md"
authors = [
    { name = "Emil Skogsund", email = "emil@skogsund.se" }
]
requires-python = ">=3.12"
dependencies = []

[project.scripts]
skogcli = "skogcli:main"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"
