name: Team Review Process

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          
      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev,testing,team]"
          
      - name: Code Quality Gate
        run: |
          source .venv/bin/activate
          
          # Format check
          echo "🔍 Checking code formatting..."
          black --check --diff .
          
          # Lint check
          echo "🔍 Running linter..."
          ruff check .
          
          # Type check
          echo "🔍 Type checking..."
          mypy src/
          
          # Security scan
          echo "🔍 Security scanning..."
          bandit -r src/ -f json -o bandit-report.json
          
          # Dependency check
          echo "🔍 Checking dependencies..."
          safety check --json --output safety-report.json
          
      - name: Upload Quality Reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: quality-reports
          path: |
            bandit-report.json
            safety-report.json

  test-suite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [unit, integration, functional]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          
      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev,testing]"
          
      - name: Run ${{ matrix.test-type }} tests
        run: |
          source .venv/bin/activate
          pytest tests/${{ matrix.test-type }}/ -v --cov=skogcli --cov-report=xml --cov-report=html -m "${{ matrix.test-type }}"
          
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: ${{ matrix.test-type }}
          name: ${{ matrix.test-type }}-coverage

  documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          
      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[docs]"
          
      - name: Build documentation
        run: |
          source .venv/bin/activate
          mkdocs build --strict
          
      - name: Test documentation links
        run: |
          source .venv/bin/activate
          # Add link checking here if desired
          echo "Documentation built successfully"

  commit-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          
      - name: Install commitizen
        run: pip install commitizen
        
      - name: Check commit messages
        run: |
          # Check last commit message format
          cz check --rev-range origin/main..HEAD
          
      - name: Validate branch name
        run: |
          BRANCH_NAME=${GITHUB_HEAD_REF}
          if [[ ! $BRANCH_NAME =~ ^(feature|fix|docs|refactor|test|chore)/.+ ]]; then
            echo "❌ Branch name '$BRANCH_NAME' doesn't follow naming convention"
            echo "Expected: feature/*, fix/*, docs/*, refactor/*, test/*, or chore/*"
            exit 1
          fi
          echo "✅ Branch name follows convention"

  team-review-checklist:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - uses: actions/checkout@v4
      
      - name: Add review checklist
        uses: actions/github-script@v6
        with:
          script: |
            const body = `
            ## 🔍 Code Review Checklist
            
            ### Functionality
            - [ ] Code does what it's supposed to do
            - [ ] Edge cases are handled appropriately
            - [ ] No obvious bugs or logic errors
            
            ### Code Quality
            - [ ] Code follows team style guidelines
            - [ ] Functions have appropriate type hints
            - [ ] Public functions have docstrings
            - [ ] Code is readable and well-structured
            
            ### Testing
            - [ ] New functionality has tests
            - [ ] Tests cover edge cases
            - [ ] All tests pass
            - [ ] Test coverage is appropriate
            
            ### Security
            - [ ] No hardcoded secrets or credentials
            - [ ] Input validation is appropriate
            - [ ] No obvious security vulnerabilities
            
            ### Performance
            - [ ] No obvious performance issues
            - [ ] Appropriate algorithms and data structures
            - [ ] Memory usage is reasonable
            
            ### Documentation
            - [ ] README updated if needed
            - [ ] API documentation updated
            - [ ] Breaking changes documented
            
            ### Team Standards
            - [ ] Follows conventional commit format
            - [ ] Branch name follows convention
            - [ ] PR description is clear and complete
            
            ---
            
            **Reviewer Guidelines:**
            - Be constructive and specific in feedback
            - Ask questions to understand the approach
            - Acknowledge good work and clever solutions
            - Focus on important issues, not nitpicks
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  performance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          
      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[testing]"
          
      - name: Run benchmark tests
        run: |
          source .venv/bin/activate
          pytest tests/ -m benchmark --benchmark-only --benchmark-json=benchmark.json || true
          
      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: benchmark.json

  review-requirements:
    runs-on: ubuntu-latest
    needs: [code-quality, test-suite, documentation, commit-quality]
    if: always()
    steps:
      - name: Check all requirements
        run: |
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Test Suite: ${{ needs.test-suite.result }}"
          echo "Documentation: ${{ needs.documentation.result }}"
          echo "Commit Quality: ${{ needs.commit-quality.result }}"
          
          if [ "${{ needs.code-quality.result }}" != "success" ] || 
             [ "${{ needs.test-suite.result }}" != "success" ] || 
             [ "${{ needs.documentation.result }}" != "success" ] || 
             [ "${{ needs.commit-quality.result }}" != "success" ]; then
            echo "❌ Some quality gates failed. Please address issues before merging."
            exit 1
          fi
          
          echo "✅ All quality gates passed! Ready for team review."